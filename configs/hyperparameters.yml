ppo_walker2d_pixel:
  algo: ppo
  env_id: Walker2d-v5
  obs: pixel
  num_envs: 4 # pocos para empezar
  total_timesteps: 100000 # 100k para test rápido
  rollout_steps: 128 # tamaño rollout
  update_epochs: 4 # épocas por rollout
  batch_size: 32
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  vf_coef: 0.5
  ent_coef: 0.0
  learning_rate: 3e-4
  max_grad_norm: 0.5

sac_walker2d_pixel:
  algo: sac
  env_id: Walker2d-v5
  obs: pixel
  num_envs: 1
  total_timesteps: 100000
  replay_buffer_size: 200000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  actor_lr: 3e-4
  critic_lr: 3e-4
  alpha: auto # o un valor fijo
