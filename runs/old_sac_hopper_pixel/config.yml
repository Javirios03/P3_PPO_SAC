algo: sac
alpha: 0.2
alpha_lr: 1e-4
auto_alpha: true
batch_size: 256
buffer_size: 200000
env_id: Hopper-v5
env_kwargs:
  # ctrl_cost_weight: 0.1
  # forward_reward_weight: 1.5
  # healthy_reward: 0.5
  ctrl_cost_weight: 0.2
  forward_reward_weight: 0.35
  healthy_reward: 1.25
  max_episode_steps: 5000
gamma: 0.99
learning_rate: 3e-4
